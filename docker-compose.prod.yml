version: "3.8"

services:
  # ── MySQL ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-FlutCRM2026!Secure}
      MYSQL_DATABASE: crm_flut
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-FlutCRM2026!Pass}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App Laravel (CRM Flut) ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage/app/public
    ports:
      - "8000:80"
    networks:
      - default
      - easypanel

  # ── Evolution API (WhatsApp) ──────────────────────────
  evolution:
    image: atendai/evolution-api:v1.8.7
    restart: always
    platform: linux/amd64
    entrypoint: ["/bin/sh", "-c", "sed -i \"s/if (!data.reactionMessage.reaction.match/if (data.reactionMessage.reaction !== '' \\&\\& !data.reactionMessage.reaction.match/g\" /evolution/dist/src/api/controllers/sendMessage.controller.js && sed -i 's/@s.whatsapp.net/@lid/g' /evolution/dist/src/api/integrations/channel/whatsapp/whatsapp.baileys.core.js; node /evolution/dist/src/main.js"]
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-430BCF13-8AA4-47DA-9723-6053BAC23F9B}
      DATABASE_ENABLED: "false"
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      TZ: America/Sao_Paulo
    ports:
      - "8080:8080"

networks:
  default:
  easypanel:
    external: true
    name: easypanel

volumes:
  mysql_data:
  storage_data:
