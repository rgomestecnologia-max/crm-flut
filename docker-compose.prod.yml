version: "3.8"

services:
  # ── MySQL ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-FlutCRM2026!Secure}
      MYSQL_DATABASE: crm_flut
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-FlutCRM2026!Pass}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App Laravel (CRM Flut) ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage/app/public
    ports:
      - "8000:80"
    networks:
      - default
      - easypanel

  # ── PostgreSQL para Evolution API v2 ───────────────────
  postgres-evo:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: evo123
      POSTGRES_DB: evolution
    volumes:
      - postgres_evo_data:/var/lib/postgresql/data

  # ── Evolution API v2.3.7 (WhatsApp) ──────────────────
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    depends_on:
      - postgres-evo
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-430BCF13-8AA4-47DA-9723-6053BAC23F9B}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evo:evo123@postgres-evo:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_v2
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      SERVER_TYPE: http
      LOG_LEVEL: WARN
      TZ: America/Sao_Paulo
    ports:
      - "8080:8080"

networks:
  default:
  easypanel:
    external: true
    name: easypanel

volumes:
  mysql_data:
  storage_data:
  postgres_evo_data:
