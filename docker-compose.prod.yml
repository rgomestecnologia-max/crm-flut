version: "3.8"

services:
  # ── MySQL ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-FlutCRM2026!Secure}
      MYSQL_DATABASE: crm_flut
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-FlutCRM2026!Pass}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App Laravel (CRM Flut) ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage/app/public
    ports:
      - "80:80"
      - "443:443"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`crm.flut.com.br`)"
      - "traefik.http.routers.crm.entrypoints=websecure"
      - "traefik.http.routers.crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm.loadbalancer.server.port=80"

  # ── Evolution API (WhatsApp) ──────────────────────────
  evolution:
    image: atendai/evolution-api:v1.8.7
    restart: always
    platform: linux/amd64
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-430BCF13-8AA4-47DA-9723-6053BAC23F9B}
      DATABASE_ENABLED: "false"
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      TZ: America/Sao_Paulo
    ports:
      - "8080:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution.rule=Host(`evolution.flut.com.br`)"
      - "traefik.http.routers.evolution.entrypoints=websecure"
      - "traefik.http.routers.evolution.tls.certresolver=letsencrypt"
      - "traefik.http.services.evolution.loadbalancer.server.port=8080"

volumes:
  mysql_data:
  storage_data:
